    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.05);
            --gold: #d4af37;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            font-family: 'Inter', sans-serif;
            color: #fff;
            scroll-behavior: smooth;
        }

        /* ШАПКА */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            background: radial-gradient(circle, #2c1b18 0%, #000 100%);
        }
        h1 { font-size: clamp(2rem, 8vw, 4rem); margin: 0; font-weight: 900; letter-spacing: -2px; }
        .tagline { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 5px; color: var(--gold); margin: 10px 0 0; }
        .sub-tagline { font-size: 0.8rem; letter-spacing: 7px; color: #666; font-weight: 300; }

        /* ОБЩИЕ СТИЛИ СЕКЦИЙ */
        section {
            padding: 50px 20px;
            background-size: cover;
            background-attachment: fixed; /* Эффект параллакса */
            background-position: center;
            /* Магия 2026 года: не рендерит то, что вне экрана */
            content-visibility: auto;
            contain-intrinsic-size: 1000px; 
        }

        .world-title {
            text-align: center; font-size: 2rem; margin-bottom: 40px;
            text-transform: uppercase; letter-spacing: 10px; color: rgba(255,255,255,0.5);
        }

        .wall-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Мобилка по умолчанию */
            gap: 15px; max-width: 1400px; margin: 0 auto;
        }

        @media (min-width: 1024px) {
            .wall-grid { grid-template-columns: repeat(6, 1fr); gap: 25px; }
        }

        /* КАРТОЧКА БРЕНДА */
        .brand-card {
            aspect-ratio: 1/1;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: 0.3s ease;
            
            overflow: hidden; /* Чтобы ничего не вылазило */
            max-width: 100%;




        }
        .brand-card:hover { border-color: var(--gold); transform: scale(1.05); background: rgba(255,255,255,0.1); }

        /* ЛОГОТИПЫ ЧЕРЕЗ СПРАЙТЫ */
        .logo {
          
            width: 198px; /* Твой размер из Birme */
            height: 198px;
            background-repeat: no-repeat; /* Убираем жесткий background-size, если ты делал спрайт-столбик */ /* Если это столбик, ширина подхватится сама */
            filter: grayscale(1) brightness(2);
            transition: 0.3s;
            background-size: 200px auto; /* Ширина спрайта совпадает с шириной блока */

            /* Масштабируем логотип под карточку, если карточка меньше 200px */
            transform: scale(0.6); /* Немного уменьшим, чтобы вписалось в сетку */
            background-origin: content-box; 
            margin: 2px;
            padding: 1px;

        }
        .brand-card:hover .logo { filter: grayscale(0) brightness(1); }

        /* СПЕЦИФИКАЦИЯ МИРОВ (СЮДА КЛАДЕМ ФОНЫ ИЗ MJ) */

        /* СТИЛИ РЕКЛАМНОГО БАННЕРА ВНУТРИ СЕТКИ */
        .ad-nest {
        position: relative;
        background: #000 !important; /* Черный фон, чтобы баннер не сливался */
        border: 1px solid rgba(212, 175, 55, 0.2) !important;
        padding: 0 !important; /* Убираем внутренние отступы для баннера */
        overflow: hidden;
        }

        .ad-tag {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        background: rgba(212, 175, 55, 0.1);
        color: #d4af37;
        font-size: 8px;
        text-align: center;
        letter-spacing: 2px;
        padding: 2px 0;
        z-index: 5;
        }

        .ad-frame {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        }

        /* Эта магия заставляет любой баннер (300x250 или 250x250) 
       сжиматься под размер твоей карточки */
        .ad-frame ins, .ad-frame iframe {
        max-width: 100% !important;
        max-height: 100% !important;
        object-fit: contain;
        }

        .fake-ad {
        width: 100%; height: 100%; 
        display: flex; align-items: center; justify-content: center;
        border: 1px dashed #222;
        }

        .ad-nest, .ad-frame, .fake-ad {

        height: 100%;
        display: flex;
        align-items: center;
