<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COFFEENAUTICA | Scroll & Taste</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; font-family: sans-serif; }
        
        /* ШАПКА */
        header { 
            height: 100vh; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            text-align: center; color: #fff;
        }
        h1 { font-size: 4rem; margin: 0; letter-spacing: -2px; }
        .tagline { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 5px; color: #d4af37; }
        .sub-tagline { font-size: 0.8rem; letter-spacing: 8px; color: #666; margin-top: 10px; }

        /* СЕТКА (2 колонки для мобилок по умолчанию) */
        .wall-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px; padding: 10px;
        }

        /* ДЕСКТОП: 6 колонок */
        @media (min-width: 1024px) {
            .wall-grid { grid-template-columns: repeat(6, 1fr); gap: 20px; padding: 40px; }
        }

        .brand-card {
            aspect-ratio: 1/1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .brand-card:hover { border-color: #d4af37; transform: scale(1.03); }
        .brand-name { color: #888; font-size: 10px; margin-top: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <h1>COFFEENAUTICA</h1>
    <p class="tagline">Scroll & Taste</p>
    <p class="sub-tagline">discover universe</p>
</header>

<section id="giants">
    <div class="wall-grid">
        <div class="brand-card"><div class="logo"></div><span class="brand-name">Starbucks</span></div>
        <div class="brand-card"><div class="logo"></div><span class="brand-name">Lavazza</span></div>
        </div>
</section>

</body>
</html>
