
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Journal</title>

<style>
body {
  margin: 0;
  background: #f4f6f1;
  color: #2f3a2f;
  font-family: Georgia, serif;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 60px 20px;
}

h1 {
  font-size: 40px;
  font-weight: 400;
  margin-bottom: 10px;
}

.date {
  opacity: 0.6;
  margin-bottom: 30px;
  font-size: 14px;
}

.content {
  font-size: 19px;
  line-height: 1.8;
  color: #3d4a3d;
}

.grid {
  display: grid;
  gap: 14px;
}

.card {
  padding: 18px;
  border-radius: 12px;
  background: #ffffff;
  border: 1px solid #d9e0d3;
  text-decoration: none;
  color: inherit;
  transition: 0.2s;
}

.card:hover {
  background: #eef2e9;
  transform: translateY(-2px);
}

.card-title {
  font-size: 18px;
  margin-bottom: 6px;
}

.card-date {
  font-size: 12px;
  opacity: 0.6;
}

.back {
  display: inline-block;
  margin-bottom: 20px;
  color: #6b7a6b;
  text-decoration: none;
}

.back:hover {
  color: #2f3a2f;
}
</style>

</head>

<body>

<div class="container">


  <h1>Journal</h1>

  <div class="grid">
    
    <a href="./japanese-coffee-culture.html" class="card">
      <div class="card-title">Japanese Coffee Culture</div>
      <div class="card-date">18 May 2026</div>
    </a>
  
  </div>


</div>

</body>
</html>
