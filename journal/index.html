

<script>
fetch('../data/articles.json')
  .then(response => response.json())
  .then(articles => {

    const container = document.getElementById('articles');

    container.innerHTML = '';

    articles.forEach(article => {

      container.innerHTML += `
        <div style="margin-bottom:20px;">
          <h2>
            <a href="./article.html?slug=${article.slug}">
              ${article.title}
            </a>
          </h2>
        </div>
      `;

    });

  })
  .catch(error => {
    console.error(error);
  });
</script>
