

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Journal</title>
</head>
<body>

<h1>Coffeenautica Journal</h1>

<div id="list">Loading...</div>

<script>
fetch('../data/articles.json')
  .then(r => r.json())
  .then(data => {
    document.getElementById('list').innerHTML =
      data.map(a => `
        <div style="margin-bottom:20px;">
          <h2>${a.title}</h2>
          <a href="/coffeenautica/journal/article.html?slug=${a.slug}">
        </div>
      `).join('');
  });
</script>

</body>
</html>
